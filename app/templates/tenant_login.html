<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant Login - SmartBiller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .glass-effect {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

<body class="min-h-screen gradient-bg flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-white rounded-full flex items-center justify-center mb-4">
        <i class="fas fa-user text-3xl text-blue-600"></i>
      </div>
      <h2 class="text-3xl font-bold text-white mb-2">Tenant Portal</h2>
      <p class="text-blue-100">Access your rent payment history and receipts</p>
    </div>

    <div class="glass-effect rounded-2xl p-8 shadow-2xl">
      <form method="POST" class="space-y-6">
        <div>
          <label for="phone" class="block text-sm font-medium text-white mb-2">
            <i class="fas fa-phone mr-2"></i>Phone Number
          </label>
          <input id="phone" name="phone" type="tel" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Enter your registered phone number">
        </div>

        <div>
          <button type="submit"
            class="w-full bg-white text-blue-600 py-3 px-4 rounded-lg font-semibold hover:bg-gray-50 transition-colors duration-200">
            <i class="fas fa-sign-in-alt mr-2"></i>Send Login Code
          </button>
        </div>
      </form>

      <div class="mt-6 text-center">
        <p class="text-blue-100">
          Are you a landlord?
          <a href="{{ url_for('main.login') }}"
            class="text-white font-semibold hover:text-blue-200 transition-colors duration-200">
            Login here
          </a>
        </p>
      </div>
    </div>

    <div class="text-center">
      <p class="text-blue-100 text-sm">
        &copy; 2025 SmartBiller. Built with <span class="text-red-400">💙</span> by
        <a href="https://techelar.co.ke" class="text-white hover:text-blue-200">TechElar</a>
      </p>
    </div>
  </div>
</body>

</html>
